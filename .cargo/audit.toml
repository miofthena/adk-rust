# =============================================================================
# cargo-audit configuration
# =============================================================================
# Advisories listed here have been reviewed and accepted per the risk
# assessment documented in docs/security/DEPENDENCY-ADVISORIES.md.
#
# Run `cargo audit` locally or in CI — these IDs will be skipped while
# new, unreviewed advisories still surface as failures.

[advisories]
ignore = [
    # rsa: Marvin timing side-channel (no upstream fix, accepted risk)
    "RUSTSEC-2023-0071",

    # rustls-webpki: CRL validation bypass (upgrade deferred, breaks workspace)
    "RUSTSEC-2026-0104",
    # rustls-webpki: Name constraint bypass
    "RUSTSEC-2026-0098",
    # rustls-webpki: Related name constraint issue
    "RUSTSEC-2026-0099",

    # lru: Unsoundness in 0.12.5 (transitive via tantivy/lancedb, replacement planned)
    # Note: lru advisory ID may vary — add the specific RUSTSEC ID when assigned

    # --- Unmaintained crates (no security impact) ---

    # async-std: Discontinued runtime, transitive shim only
    "RUSTSEC-2025-0052",
    # atomic-polyfill: Polyfill for non-std targets, ADK uses std only
    "RUSTSEC-2023-0089",
    # audiopus_sys: Unmaintained opus FFI bindings
    "RUSTSEC-2026-0150",
    # backoff: Pure-Rust retry logic, functional
    "RUSTSEC-2025-0012",
    # bincode: Internal to SurrealDB
    "RUSTSEC-2025-0141",
    # fxhash: Non-crypto hash for BM25 tables
    "RUSTSEC-2025-0057",
    # instant: Time shim, delegates to std::time on native
    "RUSTSEC-2024-0384",
    # number_prefix: Formatting utility for progress bars
    "RUSTSEC-2025-0119",
    # paste: Compile-time macro, no runtime behavior
    "RUSTSEC-2024-0436",
    # rustls-pemfile: Superseded by built-in rustls PEM parser
    "RUSTSEC-2025-0134",
]
